<!-- _includes/header.html -->
<header class="site-header" role="banner">
  <div class="container">
    <div class="header-inner">
      <a href="/" class="logo" aria-label="СВК Авто — на главную">
        <span class="logo-text">СВК Авто</span>
        <span class="logo-slogan">Сервис вашего комфорта</span>
      </a>
      
      <nav class="main-nav" role="navigation" aria-label="Главное меню">
        <button class="menu-toggle" aria-expanded="false" aria-controls="menu" aria-label="Открыть меню">
          <span class="menu-icon"></span>
        </button>
        
        <ul id="menu" class="menu">
          <li><a href="/services/">Услуги</a></li>
          <li><a href="/prices/">Цены</a></li>
          <li><a href="/promo/">Акции</a></li>
          <li><a href="/blog/">Блог</a></li>
          <li><a href="/contacts/">Контакты</a></li>
        </ul>
      </nav>
      
      <div class="header-actions">
        <a href="tel:{{ site.phones.main | remove: ' ' | remove: '(' | remove: ')' | remove: '-' | remove: '–' }}" class="btn btn-outline btn-sm">Позвонить</a>
        <a href="/contacts/" class="btn btn-primary btn-sm">Записаться</a>
      </div>
    </div>
  </div>
</header>

<!-- Mobile bottom bar -->
<div class="mobile-bottom-bar">
  <a href="tel:{{ site.phones.main | remove: ' ' | remove: '(' | remove: ')' | remove: '-' | remove: '–' }}" class="mobile-btn mobile-btn-call">
    <span class="icon">📞</span>
    <span>Позвонить</span>
  </a>
  <a href="/contacts/" class="mobile-btn mobile-btn-book">
    <span class="icon">📅</span>
    <span>Записаться</span>
  </a>
</div>
